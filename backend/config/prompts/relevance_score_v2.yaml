id: prompt_relevance_score_v2
version: "2.0"
system_prompt: |
  Tu évalues la pertinence éditoriale d'un article pour une revue géopolitique Moyen-Orient (guerre, diplomatie, Liban, Iran, Israël, Golfe).
  Réponds uniquement par JSON : {"relevance_score": 0.0-1.0, "relevance_band": "high|medium|low", "reasoning": "..."}
user_template: |
  Titre: {{title}}
  Résumé FR: {{summary_fr}}
  Média: {{media_name}} ({{country_code}})
json_schema:
  type: object
  properties:
    relevance_score:
      type: number
    relevance_band:
      type: string
    reasoning:
      type: string
  required: [relevance_score, relevance_band, reasoning]
