# Configuration du scraper standalone (sans backend)

http:
  timeout_seconds: 45
  max_attempts: 4
  min_body_chars: 400

curl_cffi:
  impersonate: "chrome131"
  timeout_seconds: 55

playwright:
  headless: true
  wait_ms: 5000
  timeout_ms: 90000
  scroll_on_article: true
  block_heavy_assets: true

wayback:
  enabled: true
  timeout_seconds: 30
  user_agent: "Mozilla/5.0 (compatible; AcademicResearchBot/1.0; +https://example.invalid)"

extraction:
  min_article_chars: 180
  min_article_words: 40
  trafilatura_favor_recall: true

rate_limit:
  delay_between_requests_seconds: 1.2
  jitter_seconds: 0.5

poc:
  articles_per_media: 3
  media_ids: []  # vide = utiliser priority_media_ids de site_selectors.json
